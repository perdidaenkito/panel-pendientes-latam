<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Pendientes — LATAM CSM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#1E2124;
    --bg-deep-2:#26292d;
    --paper:#F7F2E7;
    --paper-dim:#EFE8D8;
    --ink:#221E17;
    --ink-soft:#5B564C;
    --tomato:#C13B2A;
    --tomato-dim:#e7cdc7;
    --basil:#4B7F52;
    --basil-dim:#d9e6db;
    --mustard:#C9852C;
    --mustard-dim:#f0ddb9;
    --steel:#6B7580;
    --line:rgba(34,30,23,0.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg-deep);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(255,255,255,0.04), transparent 40%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:28px 20px 60px;
  }
  .wrap{max-width:1180px;margin:0 auto;}

  /* HEADER */
  .head{
    display:flex;justify-content:space-between;align-items:flex-end;gap:24px;
    border-bottom:2px dashed rgba(247,242,231,0.25);
    padding-bottom:18px;margin-bottom:22px;flex-wrap:wrap;
  }
  .head h1{
    font-family:'Oswald',sans-serif;
    font-weight:700;font-size:30px;letter-spacing:0.5px;
    margin:0 0 4px;text-transform:uppercase;color:var(--paper);
  }
  .head .sub{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--steel);letter-spacing:0.5px;}
  .stamp{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--bg-deep);
    background:var(--paper);border-radius:3px;padding:8px 14px;
    display:flex;flex-direction:column;gap:2px;align-items:flex-end;
    transform:rotate(-2deg);border:1px solid rgba(0,0,0,0.15);
    box-shadow:0 3px 0 rgba(0,0,0,0.25);
  }
  .stamp b{font-family:'Oswald',sans-serif;font-size:20px;letter-spacing:0.5px;}

  /* OVERVIEW STRIP */
  .overview{
    display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px;
  }
  .kpi{
    background:var(--bg-deep-2);border:1px solid rgba(255,255,255,0.08);
    border-radius:8px;padding:14px 16px;position:relative;overflow:hidden;
  }
  .kpi .n{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--paper);}
  .kpi .l{font-size:11px;color:var(--steel);text-transform:uppercase;letter-spacing:0.6px;margin-top:2px;}
  .kpi.warn .n{color:var(--tomato);}
  .kpi.ok .n{color:var(--basil);}
  .bar-outer{height:5px;border-radius:3px;background:rgba(255,255,255,0.1);margin-top:10px;overflow:hidden;}
  .bar-inner{height:100%;background:var(--basil);border-radius:3px;transition:width .4s ease;}

  /* FILTERS */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
  .chip{
    font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 13px;border-radius:20px;
    background:transparent;border:1px solid rgba(247,242,231,0.3);color:var(--paper);
    cursor:pointer;transition:all .15s ease;user-select:none;
  }
  .chip:hover{border-color:var(--paper);}
  .chip.active{background:var(--paper);color:var(--bg-deep);border-color:var(--paper);font-weight:700;}

  /* TICKET RAIL */
  .rail{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
  @media (max-width:860px){.rail{grid-template-columns:1fr;}}

  .ticket{
    background:var(--paper);color:var(--ink);border-radius:6px;
    box-shadow:0 8px 18px rgba(0,0,0,0.28);position:relative;
    display:flex;flex-direction:column;
  }
  .ticket::before{
    content:"";position:absolute;top:-6px;left:0;right:0;height:12px;
    background-image:radial-gradient(circle at 10px 6px, var(--bg-deep) 5px, transparent 5.5px);
    background-size:20px 12px;background-repeat:repeat-x;
  }
  .ticket-head{
    padding:14px 16px 10px;border-bottom:1px dashed var(--line);
    display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
  }
  .ticket-head h2{
    font-family:'Oswald',sans-serif;font-size:16.5px;font-weight:600;
    text-transform:uppercase;letter-spacing:0.4px;margin:0;
  }
  .ticket-head .tag{
    font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-soft);
    text-transform:uppercase;margin-top:3px;
  }
  .ticket-progress{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);white-space:nowrap;}

  .tasks{list-style:none;margin:0;padding:8px 6px 12px;flex:1;}
  .task{
    display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:5px;
    transition:background .15s ease;
  }
  .task.hidden{display:none;}
  .task:hover{background:rgba(0,0,0,0.04);}
  .punch{
    width:20px;height:20px;border:2px solid var(--ink);border-radius:4px;flex:none;
    margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    background:transparent;transition:all .15s ease;
  }
  .punch.done{background:var(--basil);border-color:var(--basil);}
  .punch.done::after{content:"✕";color:var(--paper);font-size:12px;font-weight:700;}
  .task-body{flex:1;min-width:0;}
  .task-text{font-size:13.5px;line-height:1.35;}
  .task.done .task-text{text-decoration:line-through;color:var(--ink-soft);}
  .task-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}
  .badge{
    font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:10px;
    text-transform:uppercase;letter-spacing:0.3px;font-weight:500;
  }
  .badge.owner{background:rgba(34,30,23,0.08);color:var(--ink);}
  .badge.date{background:var(--mustard-dim);color:#7A4E10;}
  .badge.date.urgent{background:var(--tomato-dim);color:var(--tomato);}
  .badge.nodate{background:var(--tomato-dim);color:var(--tomato);}

  .deadline-input{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;border:1px dashed var(--tomato);
    background:transparent;color:var(--tomato);border-radius:10px;padding:2px 8px;
    width:110px;margin-top:5px;
  }

  .footnote{
    text-align:center;color:var(--steel);font-family:'JetBrains Mono',monospace;
    font-size:11px;margin-top:30px;letter-spacing:0.4px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <div>
      <h1>Panel de Pendientes — LATAM</h1>
      <div class="sub">Customer Success · Operaciones distritales · actualizado en vivo</div>
    </div>
    <div class="stamp">
      <span id="today-stamp">— — —</span>
      <b>CSM LATAM</b>
    </div>
  </div>

  <div class="overview">
    <div class="kpi">
      <div class="n" id="kpi-total">—</div>
      <div class="l">Pendientes totales</div>
    </div>
    <div class="kpi ok">
      <div class="n" id="kpi-done">—</div>
      <div class="l">Completados</div>
      <div class="bar-outer"><div class="bar-inner" id="kpi-bar"></div></div>
    </div>
    <div class="kpi warn">
      <div class="n" id="kpi-nodate">—</div>
      <div class="l">Sin fecha límite</div>
    </div>
    <div class="kpi">
      <div class="n" id="kpi-clients">—</div>
      <div class="l">Clientes / frentes activos</div>
    </div>
  </div>

  <div class="filters" id="filters"></div>

  <div class="rail" id="rail"></div>

  <div class="footnote">Presiona el cuadro de cada pendiente para marcarlo. Tu progreso se guarda automáticamente.</div>
</div>

<script>
const DATA = [
  { group: "PCSAPI — Corto plazo", tasks: [
    { id:"pc1", text:"Enviar update mensual", owner:"Tú", date:"07 jul" },
    { id:"pc2", text:"Enviar reporte ejecutivo y newsletters", owner:"Tú", date:"10 jul" },
    { id:"pc3", text:"Desarrollar y presentar análisis experimental de reúso de caja de pizza", owner:"Tú", date:null },
  ]},
  { group: "PCSAPI — Mediano plazo / en marcha", tasks: [
    { id:"pm1", text:"Definir deadline del deployment de apariencia", owner:"Tú", date:null, needsDeadline:true },
    { id:"pm2", text:"Conectar el deployment de apariencia con resultados de operaciones", owner:"Tú", date:null },
    { id:"pm3", text:"Nuevo diseño de reporte distrital", owner:"Tú", date:null },
    { id:"pm4", text:"Reporte de las nuevas mediciones", owner:"Tú", date:null },
    { id:"pm5", text:"Llamadas distritales", owner:"Adri", date:null },
  ]},
  { group: "LC Perú", tasks: [
    { id:"lc1", text:"Revisar stock antes de enviar PCs", owner:"Tú", date:null },
    { id:"lc2", text:"Enviar 8 PCs", owner:"Tú", date:"jul" },
    { id:"lc3", text:"Barrido de cobertura (cámaras reubicadas)", owner:"Tú", date:null },
    { id:"lc4", text:"Vincular gráfico de tiempos en el reporte de operaciones", owner:"Tú", date:null },
    { id:"lc5", text:"Mejorar análisis de tiempos de servicio", owner:"Tú", date:null },
    { id:"lc6", text:"Enviar análisis de tiempos a newsletter y reporte ejecutivo", owner:"Tú", date:null },
  ]},
  { group: "Coralsa", tasks: [
    { id:"co1", text:"Newsletter y reporte ejecutivo", owner:"Tú", date:null },
    { id:"co2", text:"Update mensual", owner:"Tú", date:null },
    { id:"co3", text:"Reporte ejecutivo", owner:"Tú", date:null },
    { id:"co4", text:"Plan de instalación", owner:"Tú", date:null },
    { id:"co5", text:"Trabajar reportes de áreas coach", owner:"Tú", date:null },
    { id:"co6", text:"Proponer nuevas mediciones (ej. Bump and Slide)", owner:"Tú", date:null },
  ]},
  { group: "Cesar Pizza", tasks: [
    { id:"cp1", text:"Automatizar reporte B2 (sacarlo de producción local/manual)", owner:"Tú", date:null },
    { id:"cp2", text:"Terminar roll out — faltan 3 tiendas", owner:"Tú", date:null },
    { id:"cp3", text:"Propuesta de nivel 2", owner:"Tú", date:null },
  ]},
  { group: "Wendy's", tasks: [
    { id:"we1", text:"Roll out de 3 tiendas", owner:"Tú", date:null },
    { id:"we2", text:"Nuevas mediciones enfocadas en bajar tiempos de servicio", owner:"Tú", date:null },
    { id:"we3", text:"Pedir credenciales de las 3 tiendas", owner:"Tú", date:null },
  ]},
  { group: "O-Lab", tasks: [
    { id:"ol1", text:"Hablar con Alejandro, presentando resultados", owner:"Tú", date:null },
  ]},
  { group: "Copizza", tasks: [
    { id:"cz1", text:"Dar seguimiento a Copizza", owner:"Tú", date:"hoy/mañana", urgent:true },
  ]},
  { group: "Carl's", tasks: [
    { id:"ca1", text:"Presentar tendencias e investigaciones recurrentes (dinero potencial a recuperar)", owner:"Tú", date:null },
    { id:"ca2", text:"Solicitar acceso al reporte de reembolsos o credenciales", owner:"Tú", date:null },
  ]},
  { group: "LAC", tasks: [
    { id:"la1", text:"Poner reunión de revisión", owner:"Tú", date:"miér. 3:30 pm", urgent:true },
  ]},
  { group: "Proyecto: Dashboard Macro → Micro", tasks: [
    { id:"dm1", text:"Construir dashboard que conecte resultado macro con el micro (tienda/distrito)", owner:"Tú", date:null },
    { id:"dm2", text:"Presionar instalaciones en República Dominicana", owner:"Tú", date:null },
    { id:"dm3", text:"Presionar a David para que hable con Diego (RD)", owner:"David", date:null },
    { id:"dm4", text:"Presionar a Andrés para llamar a Amazon", owner:"Andrés", date:null },
  ]},
];

/* ============================================================
   CONFIGURACION JSONBin.io -- reemplaza estos dos valores
   1. Crea una cuenta gratis en https://jsonbin.io
   2. Crea un Bin nuevo con el contenido: {}
   3. Copia el "Bin ID" y tu "X-Master-Key" (Dashboard > API Keys)
   ============================================================ */
const JSONBIN_BIN_ID   = "6a4e8bc1da38895dfe41c7eb";
const JSONBIN_API_KEY  = "$2a$10$SLFuA7zg059kr/9opAe49.9K7kQkRBrAP1nhnc2YkbcaeWVs3tKge";
const JSONBIN_URL       = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
const POLL_MS           = 4000; // cada cuanto revisa cambios de otros visitantes

let state = {};
let activeFilter = "Todos";
let isConfigured = true;
let saving = false;

function showConfigBanner(){
  if (document.getElementById('config-banner')) return;
  const b = document.createElement('div');
  b.id = 'config-banner';
  b.style.cssText = 'background:#C13B2A;color:#fff;font-family:JetBrains Mono,monospace;font-size:12px;padding:10px 16px;border-radius:6px;margin-bottom:16px;';
  b.innerHTML = 'Falta configurar JSONBin. Edita las constantes JSONBIN_BIN_ID y JSONBIN_API_KEY en el codigo para que los checks se sincronicen entre visitantes. Por ahora el progreso solo se guarda en este navegador.';
  document.querySelector('.wrap').prepend(b);
}

async function loadState(){
  if (!isConfigured){
    try{ state = JSON.parse(localStorage.getItem('task-state') || '{}'); }catch(e){ state = {}; }
    showConfigBanner();
    return;
  }
  try{
    const res = await fetch(`${JSONBIN_URL}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_API_KEY }
    });
    const json = await res.json();
    state = json.record || {};
  }catch(e){
    console.error('No se pudo cargar el estado remoto', e);
  }
}

async function saveState(){
  if (!isConfigured){
    localStorage.setItem('task-state', JSON.stringify(state));
    return;
  }
  saving = true;
  try{
    await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_API_KEY
      },
      body: JSON.stringify(state)
    });
  }catch(e){
    console.error('No se pudo guardar el estado remoto', e);
  }finally{
    saving = false;
  }
}

// Revisa periodicamente si otros visitantes marcaron algo, y refresca la vista
function startPolling(){
  if (!isConfigured) return;
  setInterval(async () => {
    if (saving) return;
    const prev = JSON.stringify(state);
    await loadState();
    if (JSON.stringify(state) !== prev) render();
  }, POLL_MS);
}

function allTasks(){ return DATA.flatMap(g => g.tasks); }

function owners(){
  const set = new Set(allTasks().map(t => t.owner));
  return ["Todos", ...Array.from(set)];
}

function renderFilters(){
  const el = document.getElementById('filters');
  el.innerHTML = '';
  owners().forEach(o => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (o === activeFilter ? ' active' : '');
    chip.textContent = o;
    chip.onclick = () => { activeFilter = o; render(); };
    el.appendChild(chip);
  });
}

function renderKPIs(){
  const tasks = allTasks();
  const total = tasks.length;
  const done = tasks.filter(t => state[t.id]).length;
  const nodate = tasks.filter(t => !t.date && !state[t.id]).length;
  document.getElementById('kpi-total').textContent = total;
  document.getElementById('kpi-done').textContent = done;
  document.getElementById('kpi-nodate').textContent = nodate;
  document.getElementById('kpi-clients').textContent = DATA.length;
  document.getElementById('kpi-bar').style.width = Math.round((done/total)*100) + '%';
}

function renderRail(){
  const rail = document.getElementById('rail');
  rail.innerHTML = '';
  DATA.forEach(group => {
    const visibleTasks = group.tasks.filter(t => activeFilter === "Todos" || t.owner === activeFilter);
    if (visibleTasks.length === 0) return;

    const doneCount = group.tasks.filter(t => state[t.id]).length;

    const ticket = document.createElement('div');
    ticket.className = 'ticket';
    ticket.innerHTML = `
      <div class="ticket-head">
        <div>
          <h2>${group.group}</h2>
          <div class="tag">${group.tasks.length} pendiente${group.tasks.length>1?'s':''}</div>
        </div>
        <div class="ticket-progress">${doneCount}/${group.tasks.length}</div>
      </div>
      <ul class="tasks"></ul>
    `;
    const ul = ticket.querySelector('.tasks');

    group.tasks.forEach(t => {
      const hide = !(activeFilter === "Todos" || t.owner === activeFilter);
      const li = document.createElement('li');
      li.className = 'task' + (state[t.id] ? ' done' : '') + (hide ? ' hidden' : '');

      let dateBadge = '';
      if (t.date){
        dateBadge = `<span class="badge date${t.urgent ? ' urgent' : ''}">${t.date}</span>`;
      } else if (t.needsDeadline){
        dateBadge = `<input class="deadline-input" placeholder="poner fecha" value="${state['deadline_'+t.id] || ''}" data-deadline-for="${t.id}">`;
      } else {
        dateBadge = `<span class="badge nodate">sin fecha</span>`;
      }

      li.innerHTML = `
        <div class="punch ${state[t.id] ? 'done' : ''}" data-id="${t.id}"></div>
        <div class="task-body">
          <div class="task-text">${t.text}</div>
          <div class="task-meta">
            <span class="badge owner">${t.owner}</span>
            ${dateBadge}
          </div>
        </div>
      `;
      ul.appendChild(li);
    });

    rail.appendChild(ticket);
  });

  rail.querySelectorAll('.punch').forEach(p => {
    p.addEventListener('click', async () => {
      const id = p.dataset.id;
      state[id] = !state[id];
      await saveState();
      render();
    });
  });

  rail.querySelectorAll('.deadline-input').forEach(inp => {
    inp.addEventListener('change', async () => {
      state['deadline_' + inp.dataset.deadlineFor] = inp.value;
      await saveState();
    });
  });
}

function render(){
  renderFilters();
  renderKPIs();
  renderRail();
}

function stampDate(){
  const d = new Date();
  const opts = { day:'2-digit', month:'short' };
  document.getElementById('today-stamp').textContent = d.toLocaleDateString('es-ES', opts).toUpperCase();
}

(async () => {
  stampDate();
  await loadState();
  render();
  startPolling();
})();
</script>
</body>
</html>
